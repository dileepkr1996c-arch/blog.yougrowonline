<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | You Grow Online Blog</title>
  <meta name="description" content="Page not found. Return to You Grow Online Blog homepage.">
  <link rel="canonical" href="https://blog.yougrowonline.in/404.html">
  <link rel="icon" type="image/png" href="https://yougrowonline.in/assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- CSS ko absolute path se link kiya hai taaki sub-folders me styling kharab na ho -->
  <link rel="stylesheet" href="https://yougrowonline.in/assets/css/style.css">

  <!-- Backup Redirection: Agar JavaScript disabled ho toh 3 seconds me automatic redirect karega -->
  <meta http-equiv="refresh" content="3; url=https://blog.yougrowonline.in/">
</head>
<body>
  <div class="error-page">
    <div>
      <h1>404</h1>
      <h2>Redirecting to Blog Home...</h2>
      <p>The blog post you're looking for doesn't exist or has been moved.</p>
      <a href="https://blog.yougrowonline.in/" class="btn btn-primary">Back to Blog Home &rarr;</a>
    </div>
  </div>

  <!-- Main JavaScript Redirection: Turant redirect karne ke liye -->
  <script>
    window.location.replace("https://blog.yougrowonline.in/");
  </script>
</body>
</html>
