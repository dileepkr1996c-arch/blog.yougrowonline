# Decap CMS Configuration for You Grow Online
# https://decapcms.org/docs/configuration-options/

backend:
  name: github
  repo: dileepkr1996c-arch/blog.yougrowonline
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: /auth?site_id=fe812d22-6ce6-48f6-b427-980e82ce1191
  
media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    path: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "blog/{{slug}}"
    extension: .md
    format: frontmatter
    editor:
      preview: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image URL", name: "image", widget: "text", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - label: "Category"
        name: "categories"
        widget: "select"
        options: ["web-development", "ecommerce", "marketing", "seo", "ai", "design"]
        required: false
