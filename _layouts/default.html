<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js" crossorigin="anonymous"></script>
<script>
  window.googletag = window.googletag || {cmd: []};
  googletag.cmd.push(function() {
    
    // 1. स्क्रीन साइज के हिसाब से ऐड साइज की मैपिंग
    var YGO_Home_Header_Mapping = googletag.sizeMapping()
      // डेस्कटॉप (1024px या उससे बड़ी स्क्रीन)
      .addSize([1024, 0], [[970, 250], [970, 90], [728, 90]])
      // टैबलेट (768px से 1023px की स्क्रीन)
      .addSize([768, 0], [[728, 90], [468, 60]])
      // मोबाइल (767px से छोटी स्क्रीन) - केवल सुरक्षित मोबाइल साइज लोड होगा
      .addSize([0, 0], [[320, 50]])
      .build();

    // 2. स्लॉट डिफाइन करना और उसमें मैपिंग जोड़ना
    googletag.defineSlot('/23002577677/YGO_Home_Header', [[320, 50], [468, 60], [970, 90], [970, 250], [728, 90]], 'div-gpt-ad-1784236817468-0')
             .defineSizeMapping(YGO_Home_Header_Mapping) // मैपिंग यहाँ अप्लाई की गई है
             .addService(googletag.pubads());

    googletag.pubads().enableSingleRequest();
    googletag.enableServices();
  });
</script>
  
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8524730224202436"
     crossorigin="anonymous"></script>
  <meta name="google-site-verification" content="jYQIYZjGvMxFXd2MXA8dYNAR_zwQ3A0KiKegWU1zy70" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="{% if page.keywords %}{{ page.keywords }}{% else %}digital agency, web development, ecommerce, digital marketing, SEO, blog{% endif %}">
  <link rel="icon" type="image/png" href="/assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/style.css">
  {% seo %}
</head>
<body>

  {% include header.html %}

  {{ content }}

  <script src="/assets/js/main.js"></script>
  {% if page.layout == 'post' %}
  <script src="/assets/js/sidebar.js"></script>
  {% endif %}
</body>
</html>
