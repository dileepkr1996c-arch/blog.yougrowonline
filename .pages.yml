{
  "media": {
    "input": "assets/images",
    "output": "/assets/images"
  },
  "content": [
    {
      "name": "Blogs",
      "label": "Blogs",
      "type": "collection",
      "path": "_posts",
      "fields": [
        {
          "name": "title",
          "label": "Title (H1 Heading)",
          "type": "string"
        },
        {
          "name": "permalink",
          "label": "Custom URL Slug",
          "type": "string"
        },
        {
          "name": "date",
          "label": "Publish Date",
          "type": "date"
        },
        {
          "name": "layout",
          "label": "Layout",
          "type": "hidden",
          "default": "post"
        },
        {
          "name": "author",
          "label": "Author",
          "type": "string",
          "default": "You Grow Online"
        },
        {
          "name": "image",
          "label": "Featured Image",
          "type": "image"
        },
        {
          "name": "image_alt",
          "label": "Image ALT Text",
          "type": "string"
        },
        {
          "name": "excerpt",
          "label": "Short Excerpt",
          "type": "text"
        },
        {
          "name": "description",
          "label": "Meta Description",
          "type": "text"
        },
        {
          "name": "meta_title",
          "label": "SEO Meta Title",
          "type": "string"
        },
        {
          "name": "focus_keyword",
          "label": "Focus Keyword",
          "type": "string"
        },
        {
          "name": "secondary_keywords",
          "label": "Secondary Keywords",
          "type": "string"
        },
        {
          "name": "canonical_url",
          "label": "Canonical URL",
          "type": "string"
        },
        {
          "name": "target_country",
          "label": "Target Country",
          "type": "string"
        },
        {
          "name": "target_language",
          "label": "Target Language",
          "type": "string",
          "default": "English"
        },
        {
          "name": "publish_time",
          "label": "Best Publish Time",
          "type": "string",
          "default": "08:00 AM IST"
        },
        {
          "name": "content_type",
          "label": "Content Type",
          "type": "string"
        },
        {
          "name": "search_intent",
          "label": "Search Intent",
          "type": "string"
        },
        {
          "name": "reading_time",
          "label": "Reading Time",
          "type": "string"
        },
        {
          "name": "categories",
          "label": "Categories",
          "type": "string"
        },
        {
          "name": "tags",
          "label": "Tags",
          "type": "string"
        },
        {
          "name": "body",
          "label": "Article Content",
          "type": "rich-text"
        }
      ]
    }
  ]
}